name: Sunder AI Radar

on:
  schedule:
    - cron: '17 0 * * *'
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 建議：未來請 A夢 把這些套件寫進 requirements.txt，這裡先照你的原樣維持運作
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 pydantic python-dotenv google-genai tenacity

      - name: Run Sunder Radar AI Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python sunder_radar.py

      # 核心修正：替換為 TWProbe 正在使用的穩定 Commit 套件
      - name: Commit output mapping and markdown
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update industry radar news"
          file_pattern: "sunder_sent_posts.txt src/content/news/ src/assets/images/news/"
