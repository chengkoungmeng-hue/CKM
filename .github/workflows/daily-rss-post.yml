name: Daily RSS Post Generator

on:
  schedule:
    # Run every day at 00:00 UTC (8:00 AM Cambodia Time)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions UI

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate Khmer Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run generate:post

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/km/
          git commit -m "chore: auto-generate daily RSS SEO post [skip ci]" || echo "No changes to commit"
          git push
